# Publishes the package to npm when:
#   - a GitHub Release is created (explicit, tagged release), or
#   - a commit lands on main and package.json declares a version that's
#     not yet on the registry (auto-publish on version bump).
#
# Pushes to main that don't bump the version are no-ops on the publish
# step, so routine merges don't fail and don't republish.

name: Node.js Package

on:
  release:
    types: [created]
  push:
    branches: [main]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: npm install
      - run: npm run build

      - name: Check whether this version is already on npm
        id: check
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          echo "Resolved $name@$version"
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "Version $version already published; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version $version not yet published; will publish."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.npm_token}}
